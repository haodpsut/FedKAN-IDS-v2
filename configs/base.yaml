seed: 42
device: auto

data:
  name: synthetic
  n_samples: 20000
  n_features: 43
  n_classes: 2
  test_ratio: 0.2
  alpha: 0.1
  n_clients: 10

fl:
  rounds: 50
  fraction: 1.0
  local_epochs: 1
  batch_size: 1024
  lr: 0.01
  optimizer: adam
  weight_decay: 0.0

model:
  name: kan
  hidden: [8]
  grid_size: 5
  spline_order: 3

output:
  dir: results/runs
  save_per_round: true
  save_state_dict: false
